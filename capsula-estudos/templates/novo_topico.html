{% extends "base.html" %}

{% block title %}Novo Tópico — Cápsula de Estudos{% endblock %}

{% block content %}
  <section class="form-card">
    <h1>Novo tópico em {{ materia.nome }}</h1>

    <form method="POST" action="{{ url_for('novo_topico', materia_id=materia.id) }}">
      <label for="titulo">Título</label>
      <input type="text" id="titulo" name="titulo" placeholder="Ex: Mitose e Meiose" required>

      <label for="resumo">Resumo</label>
      <textarea id="resumo" name="resumo" rows="4" placeholder="Anotações curtas sobre o conteúdo..."></textarea>

      <label for="dificuldade">Dificuldade (1 a 5)</label>
      <select id="dificuldade" name="dificuldade">
        <option value="1">1 - Muito fácil</option>
        <option value="2">2 - Fácil</option>
        <option value="3" selected>3 - Média</option>
        <option value="4">4 - Difícil</option>
        <option value="5">5 - Muito difícil</option>
      </select>

      <label for="data_revisao">Data de revisão (opcional)</label>
      <input type="date" id="data_revisao" name="data_revisao">

      <button type="submit">Criar tópico</button>
    </form>

    <p class="form-footer">
      <a href="{{ url_for('topicos', materia_id=materia.id) }}">← Voltar para tópicos</a>
    </p>
  </section>
{% endblock %}
